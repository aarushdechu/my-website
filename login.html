<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login or Sign up - Aarush Dechu</title>
  <meta name="description" content="Log in or sign up for Aarush's website." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="index.html"><span class="mark">✦</span> Aarush</a>
      <button class="nav-toggle" aria-label="Open menu" aria-expanded="false">☰</button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="about.html">About</a></li>
        <li><a class="nav-feature" href="math.html">Quadratic</a></li>
        <li><a href="login.html" data-auth-link aria-current="page">Login</a></li>
      </ul>
    </div>
  </header>

  <main class="auth-shell">
    <section class="auth-card" aria-labelledby="login-title">
      <span class="eyebrow">Member access</span>
      <h1 id="login-title">Log in</h1>
      <p class="auth-intro" id="auth-intro">Log in to unlock Quadratic.</p>

      <div class="auth-tabs" role="tablist" aria-label="Choose login or sign up">
        <button class="auth-tab is-active" type="button" data-auth-tab="login" role="tab" aria-selected="true">Log in</button>
        <button class="auth-tab" type="button" data-auth-tab="signup" role="tab" aria-selected="false">Sign up</button>
      </div>

      <form class="auth-form" id="login-form" data-auth-panel="login" data-submit-text="Log in">
        <div class="auth-field">
          <label for="login-username">Email or username</label>
          <input id="login-username" name="username" type="text" autocomplete="username" required />
        </div>

        <div class="auth-field">
          <label for="login-password">Password</label>
          <input id="login-password" name="password" type="password" autocomplete="current-password" required />
        </div>

        <button class="btn btn--coral auth-submit" type="submit">Log in</button>
      </form>

      <form class="auth-form" id="signup-form" data-auth-panel="signup" data-submit-text="Sign up" hidden>
        <div class="auth-field">
          <label for="signup-username">Email or username</label>
          <input id="signup-username" name="username" type="text" autocomplete="username" required />
        </div>

        <div class="auth-field">
          <label for="signup-password">Password</label>
          <input id="signup-password" name="password" type="password" autocomplete="new-password" minlength="8" required />
        </div>

        <div class="auth-field">
          <label for="signup-confirm-password">Confirm password</label>
          <input id="signup-confirm-password" name="confirm-password" type="password" autocomplete="new-password" minlength="8" required />
        </div>

        <button class="btn btn--coral auth-submit" type="submit">Sign up</button>
      </form>

      <p class="auth-message" id="login-message" role="status" aria-live="polite"></p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <span>Made with paper, pixels, and hot chocolate by Aarush.</span>
      <span>© <span data-year>2026</span> Aarush Dechu</span>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
